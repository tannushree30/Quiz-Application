<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Results</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quiz Complete</h1>
    </header>
    <main class="result">
        <div id="result-container">
            <h2 id ="text">Outstanding!</h2>
            <p>Score is:</p>
            <div id="score-display">
                <span id="score">0</span><span>/</span>10
            </div>
            <div id="stats">
                <div class="stat correct">
                    <span class="icon">✓</span>
                    <span>Correct:</span>
                    <span class="count" id="correct-count">0</span>
                </div>
                <div class="stat incorrect">
                    <span class="icon">✗</span>
                    <span>Incorrect:</span>
                    <span class="count" id="incorrect-count">0</span>
                </div>
                <div class="stat unattempted">
                    <span class="icon">O</span>
                    <span>Unattempted:</span>
                    <span class="count" id="unattempted-count">0</span>
                </div>
            </div>
        </div>
        <div class="buttons">
            <a id="review-button" href="./index.html">Review Answers</a>
            <button id="restart-button">Restart Quiz</button>
        </div>
    </main>
    <script src="script.js"></script> 
</body>
</html>
