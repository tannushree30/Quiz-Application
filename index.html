<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Knowledge Quiz</title>
</head>
<body>
    <header>
        <h1>Welcome to the General Knowledge Quiz</h1>
    </header>
    <main>
        <div id="quiz-container">
            <div id="number">Question 1 of 10</div>
            <div id="question">
                <h2>What is the capital of France?</h2>
            </div>
            <div id="options-container">
                <button class="option" id="option-a">A) Berlin</button>
                <button class="option" id="option-b">B) Madrid</button>
                <button class="option" id="option-c">C) Paris</button>
                <button class="option" id="option-d">D) Rome</button>
            </div>
            <div class="buttons">
                <button id="prev-button">Previous Question</button> 
                <button id="next-button">Next Question</button>
            </div>
        </div>
    </main>
    <div class="result">
        <h2>Quiz Complete!</h2>
        <p>Your Score: <span id="score">0</span>/10</p>
        <div class="buttons">
            <button id="review-button">Review Answers</button>
            <button id="restart-button">Restart Quiz</button>
        </div>
    </div>    
</body>
</html>
